<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Greenhouse - Planta-Pro-Max</title>
    
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <style>
        :root {
            --bg-color: #f0f4f8;
            --card-bg: #ffffff;
            --primary: #2ecc71;
            --secondary: #3498db;
            --danger: #e74c3c;
            --text: #2c3e50;
            --text-light: #7f8c8d;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text);
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
        }

        header h1 {
            margin: 0;
            color: var(--primary);
            font-size: 2.5rem;
        }

        .status-bar {
            display: inline-block;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.8rem;
            background: #dfe6e9;
            margin-top: 10px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .card {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
            transition: transform 0.3s ease;
            text-align: center;
        }

        .card:hover { transform: translateY(-5px); }

        .icon { font-size: 2.5rem; margin-bottom: 10px; display: block; }

        .label {
            display: block;
            color: var(--text-light);
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 5px;
        }

        .value {
            font-size: 2rem;
            font-weight: bold;
            display: block;
        }

        .unit { font-size: 1rem; color: var(--text-light); }

        /* Estilos del Botón */
        .control-panel {
            background: var(--card-bg);
            padding: 30px;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
        }

        .btn-control {
            border: none;
            padding: 20px 50px;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            color: white;
            width: 100%;
            max-width: 300px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-on { background: var(--primary); box-shadow: 0 6px #27ae60; }
        .btn-off { background: var(--danger); box-shadow: 0 6px #c0392b; }
        .btn-control:active { transform: translateY(4px); box-shadow: 0 0; }

        .bomba-status-tag {
            margin-top: 15px;
            font-weight: bold;
            display: block;
        }

        .online { color: #27ae60; }
        .offline { color: #e74c3c; }

    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Invernadero Inteligente 🌿</h1>
        <div id="connection-badge" class="status-bar">Conectando a la nube...</div>
    </header>

    <div class="grid">
        <!-- Temperatura -->
        <div class="card">
            <span class="icon">🌡️</span>
            <span class="label">Temperatura</span>
            <span class="value" id="val-temp">--</span><span class="unit">°C</span>
        </div>

        <!-- Humedad Aire -->
        <div class="card">
            <span class="icon">💧</span>
            <span class="label">Hum. Ambiente</span>
            <span class="value" id="val-hum">--</span><span class="unit">%</span>
        </div>

        <!-- Humedad Tierra -->
        <div class="card">
            <span class="icon">🪴</span>
            <span class="label">Hum. Suelo</span>
            <span class="value" id="val-tierra">--</span><span class="unit">%</span>
        </div>

        <!-- Luz -->
        <div class="card">
            <span class="icon">☀️</span>
            <span class="label">Intensidad Luz</span>
            <span class="value" id="val-luz">--</span><span class="unit">Raw</span>
        </div>
    </div>

    <div class="control-panel">
        <span class="label">Control de Riego</span>
        <button id="btnBomba" class="btn-control btn-off" onclick="toggleBomba()">Cargando...</button>
        <span id="bomba-status-text" class="bomba-status-tag">ESTADO ACTUAL: DESCONOCIDO</span>
    </div>
</div>

<script>
    // Configuración de tu Firebase
    const firebaseConfig = {
        databaseURL: "https://sensores-temp-y-humedad-default-rtdb.firebaseio.com/"
    };
    
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let bombaManual = false;

    // 1. Escuchar Sensores (Carpeta /sensor)
    db.ref('sensor').on('value', (snapshot) => {
        const data = snapshot.val();
        if (data) {
            document.getElementById('val-temp').innerText = data.temperatura || "0";
            document.getElementById('val-hum').innerText = data.humedad || "0";
            document.getElementById('val-tierra').innerText = data.tierra || "0";
            document.getElementById('val-luz').innerText = data.luz || "0";
            
            const badge = document.getElementById('connection-badge');
            badge.innerText = "Sincronizado en tiempo real ✅";
            badge.classList.add('online');
        }
    });

    // 2. Escuchar Estado de la Bomba (Carpeta /actuadores)
    db.ref('actuadores/bombaManual').on('value', (snapshot) => {
        bombaManual = snapshot.val() || false;
        updateUI(bombaManual);
    });

    // 3. Función para cambiar estado
    function toggleBomba() {
        const nuevoEstado = !bombaManual;
        db.ref('actuadores/bombaManual').set(nuevoEstado)
        .then(() => console.log("Comando enviado exitosamente"))
        .catch(err => alert("Error de conexión: " + err.message));
    }

    // 4. Actualizar Interfaz del Botón
    function updateUI(estado) {
        const btn = document.getElementById('btnBomba');
        const txt = document.getElementById('bomba-status-text');

        if (estado) {
            btn.innerText = "Apagar Bomba";
            btn.className = "btn-control btn-on";
            txt.innerText = "ESTADO ACTUAL: ENCENDIDO MANUAL 💧";
            txt.style.color = "#27ae60";
        } else {
            btn.innerText = "Encender Bomba";
            btn.className = "btn-control btn-off";
            txt.innerText = "ESTADO ACTUAL: AUTOMÁTICO / APAGADO 😴";
            txt.style.color = "#e74c3c";
        }
    }
</script>

</body>
</html>
