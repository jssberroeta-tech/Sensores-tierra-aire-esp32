<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Planta-Pro-Max v3.0</title>
    
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <style>
        :root {
            --bg: #f4f7f6;
            --card: #ffffff;
            --primary: #27ae60;
            --danger: #e74c3c;
            --warning: #f1c40f;
            --text: #2d3436;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
            transition: background-color 0.5s ease;
        }

        /* Clase para alerta crítica */
        body.alerta-activa {
            background-color: #ffcccc;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            padding: 20px 0;
        }

        .badge {
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: bold;
            background: #dfe6e9;
            display: inline-block;
            margin-bottom: 10px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .card {
            background: var(--card);
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 8px 15px rgba(0,0,0,0.05);
            text-align: center;
            border-bottom: 5px solid transparent;
        }

        .card.alerta { border-color: var(--danger); animation: pulse 1.5s infinite; }
        .card.temp { border-color: #ff7675; }
        .card.hum { border-color: #74b9ff; }
        .card.tierra { border-color: #b2bec3; }
        .card.luz { border-color: #ffeaa7; }

        .icon { font-size: 2.5rem; margin-bottom: 10px; display: block; }
        .val { font-size: 2.2rem; font-weight: 800; display: block; margin: 5px 0; }
        .label { color: #636e72; font-size: 0.8rem; text-transform: uppercase; font-weight: bold; }

        .control-panel {
            margin-top: 30px;
            background: var(--card);
            padding: 30px;
            border-radius: 25px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .btn {
            width: 100%;
            max-width: 350px;
            padding: 20px;
            font-size: 1.3rem;
            font-weight: bold;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            color: white;
            transition: 0.3s;
            text-transform: uppercase;
        }

        .btn-off { background: var(--danger); box-shadow: 0 6px #c0392b; }
        .btn-on { background: var(--primary); box-shadow: 0 6px #1e8449; }
        .btn:active { transform: translateY(4px); box-shadow: 0 0; }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.03); }
            100% { transform: scale(1); }
        }

        .alert-banner {
            display: none;
            background: var(--danger);
            color: white;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            font-weight: bold;
            animation: pulse 1s infinite;
        }
    </style>
</head>
<body>

<div class="container">
    <div id="danger-msg" class="alert-banner">
        ⚠️ ¡ALERTA CRÍTICA: AMBIENTE PELIGROSO PARA LA PLANTA! (T > 27°C & H > 80%)
    </div>

    <div class="header">
        <div id="status-badge" class="badge">Sincronizando con Firebase...</div>
        <h1>Sistema Planta-Pro-Max 🌿</h1>
    </div>

    <div class="grid">
        <!-- Temperatura -->
        <div class="card temp">
            <span class="icon">🌡️</span>
            <span class="label">Temperatura</span>
            <span id="txt-temp" class="val">--</span><small>°C</small>
        </div>

        <!-- Humedad Aire -->
        <div class="card hum">
            <span class="icon">☁️</span>
            <span class="label">Humedad Aire</span>
            <span id="txt-hum" class="val">--</span><small>%</small>
        </div>

        <!-- Humedad Tierra -->
        <div class="card tierra">
            <span class="icon">🪴</span>
            <span class="label">Humedad Suelo</span>
            <span id="txt-tierra" class="val">--</span><small>%</small>
        </div>

        <!-- Luz -->
        <div class="card luz">
            <span class="icon">☀️</span>
            <span class="label">Luz (Raw)</span>
            <span id="txt-luz" class="val">--</span>
        </div>
    </div>

    <div class="control-panel">
        <h3>Control Manual de Bomba</h3>
        <button id="mainBtn" class="btn btn-off" onclick="pulsarBoton()">Conectando...</button>
        <p id="bomba-info" style="margin-top:15px; font-weight:bold;">Cargando estado...</p>
    </div>
</div>

<script>
    // REVISA QUE ESTA URL SEA EXACTAMENTE LA TUYA
    const firebaseConfig = {
        databaseURL: "https://sensores-temp-y-humedad-default-rtdb.firebaseio.com/"
    };
    
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    let bombaManual = false;

    // ESCUCHAR DATOS DE SENSORES
    database.ref('sensor').on('value', (snap) => {
        const data = snap.val();
        if(data) {
            document.getElementById('txt-temp').innerText = data.temperatura || 0;
            document.getElementById('txt-hum').innerText = data.humedad || 0;
            document.getElementById('txt-tierra').innerText = data.tierra || 0;
            document.getElementById('txt-luz').innerText = data.luz || 0;

            // Lógica de alerta visual en la web (H > 80 y T > 27)
            const isDanger = (data.humedad > 80 && data.temperatura > 27);
            const banner = document.getElementById('danger-msg');
            const badge = document.getElementById('status-badge');

            if(isDanger) {
                document.body.classList.add('alerta-activa');
                banner.style.display = "block";
                badge.innerText = "🚨 ESTADO CRÍTICO";
                badge.style.background = "#e74c3c";
                badge.style.color = "white";
            } else {
                document.body.classList.remove('alerta-activa');
                banner.style.display = "none";
                badge.innerText = "Conexión Estable ✅";
                badge.style.background = "#27ae60";
                badge.style.color = "white";
            }
        }
    });

    // ESCUCHAR EL ESTADO DE LA BOMBA
    database.ref('actuadores/bombaManual').on('value', (snap) => {
        bombaManual = snap.val() || false;
        const btn = document.getElementById('mainBtn');
        const info = document.getElementById('bomba-info');

        if(bombaManual) {
            btn.innerText = "APAGAR BOMBA";
            btn.className = "btn btn-on";
            info.innerText = "MODO: MANUAL (ENCENDIDO)";
            info.style.color = "#27ae60";
        } else {
            btn.innerText = "ENCENDER BOMBA";
            btn.className = "btn btn-off";
            info.innerText = "MODO: AUTOMÁTICO / APAGADO";
            info.style.color = "#e74c3c";
        }
    });

    function pulsarBoton() {
        const estadoNuevo = !bombaManual;
        database.ref('actuadores/bombaManual').set(estadoNuevo)
        .then(() => console.log("Cambiado a: " + estadoNuevo))
        .catch(err => alert("Error en Firebase: " + err.message));
    }
</script>

</body>
</html>
