<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Panel de Control - Jesús</title>
    <!-- Cargando Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; text-align: center; background: #eef2f3; color: #333; }
        .container { max-width: 500px; margin: 30px auto; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 8px 16px rgba(0,0,0,0.1); }
        .sensor-val { font-size: 24px; font-weight: bold; color: #2c3e50; }
        .btn { padding: 20px 40px; font-size: 20px; cursor: pointer; border: none; border-radius: 50px; color: white; transition: 0.3s; width: 80%; }
        .on { background: #27ae60; box-shadow: 0 4px #1e8449; }
        .on:active { box-shadow: 0 0; transform: translateY(4px); }
        .off { background: #c0392b; box-shadow: 0 4px #922b21; }
        .off:active { box-shadow: 0 0; transform: translateY(4px); }
    </style>
</head>
<body>

<div class="container">
    <h1>Invernadero Inteligente</h1>
    <hr>
    <p>Humedad Tierra: <span id="tierra" class="sensor-val">0</span>%</p>
    <p>Luz: <span id="luz" class="sensor-val">0</span></p>
    <hr>
    <h3>Control de Bomba</h3>
    <button id="btnBomba" class="btn off" onclick="enviarSenal()">ENCENDER BOMBA</button>
    <p id="statusText">Estado: Automático</p>
</div>

<script>
    // 1. TU CONFIGURACIÓN
    const firebaseConfig = {
        databaseURL: "https://sensores-temp-y-humedad-default-rtdb.firebaseio.com"
    };
    
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    // 2. ESCUCHAR DATOS (Para ver que hay conexión)
    database.ref('sensor').on('value', (snapshot) => {
        const data = snapshot.val();
        if(data) {
            document.getElementById('tierra').innerText = data.tierra || 0;
            document.getElementById('luz').innerText = data.luz || 0;
        }
    });

    // 3. FUNCIÓN DEL BOTÓN (ESCRIBIR)
    let bombaEncendida = false;

    function enviarSenal() {
        bombaEncendida = !bombaEncendida;
        
        // Escribimos en la ruta exacta que lee el ESP32
        database.ref('actuadores').update({
            bombaManual: bombaEncendida
        })
        .then(() => {
            console.log("Enviado a Firebase: ", bombaEncendida);
            actualizarUI();
        })
        .catch((error) => {
            console.error("Error al enviar: ", error);
            alert("Error de conexión con Firebase");
        });
    }

    function actualizarUI() {
        const btn = document.getElementById('btnBomba');
        const txt = document.getElementById('statusText');
        
        if(bombaEncendida) {
            btn.innerText = "APAGAR BOMBA";
            btn.className = "btn on";
            txt.innerText = "Estado: Manual (Encendido)";
        } else {
            btn.innerText = "ENCENDER BOMBA";
            btn.className = "btn off";
            txt.innerText = "Estado: Automático / Apagado";
        }
    }
</script>

</body>
</html>
