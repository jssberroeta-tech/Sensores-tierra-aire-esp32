<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PLANTA-PRO-MAX Dashboard</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f0f2f5; text-align: center; padding: 20px; }
        .container { max-width: 500px; margin: auto; background: white; padding: 25px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .sensor-card { background: #eef7ff; padding: 15px; border-radius: 10px; margin-bottom: 10px; border-left: 5px solid #007bff; }
        .sensor-val { font-size: 1.5em; font-weight: bold; color: #333; }
        .btn { padding: 15px 30px; font-size: 1.1em; cursor: pointer; border: none; border-radius: 8px; transition: 0.3s; width: 100%; margin-top: 10px; font-weight: bold; }
        .btn-on { background-color: #28a745; color: white; }
        .btn-off { background-color: #dc3545; color: white; }
        .status { margin-top: 15px; font-style: italic; color: #666; }
    </style>
</head>
<body>

<div class="container">
    <h1>PLANTA-PRO-MAX</h1>
    
    <div class="sensor-card">
        <div>Humedad de Tierra (Suelo)</div>
        <div class="sensor-val" id="tierra">--%</div>
    </div>

    <div class="sensor-card">
        <div>Temperatura del Aire</div>
        <div class="sensor-val" id="temp">--°C</div>
    </div>

    <div class="sensor-card">
        <div>Humedad del Aire</div>
        <div class="sensor-val" id="humedad">--%</div>
    </div>

    <button id="btnBomba" class="btn btn-off" onclick="toggleBomba()">CARGANDO...</button>
    <p class="status" id="estadoTxt">Estado: Sincronizando con Firebase...</p>
</div>

<script>
    // --- CONFIGURACIÓN DE FIREBASE ---
    const firebaseConfig = {
        databaseURL: "https://sensores-temp-y-humedad-default-rtdb.firebaseio.com"
    };
    
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    // Referencias a los nodos del Arduino
    const refTierra = database.ref('/sensor/tierra');
    const refTemp = database.ref('/sensor/temperatura');
    const refHum = database.ref('/sensor/humedad');
    const refBomba = database.ref('/actuadores/bomba');

    let bombaEstadoActual = false;

    // --- LECTURA EN TIEMPO REAL ---
    refTierra.on('value', (snapshot) => {
        document.getElementById('tierra').innerText = snapshot.val() + "%";
    });

    refTemp.on('value', (snapshot) => {
        document.getElementById('temp').innerText = snapshot.val() + "°C";
    });

    refHum.on('value', (snapshot) => {
        document.getElementById('humedad').innerText = snapshot.val() + "%";
    });

    // --- CONTROL DE BOTÓN Y BOMBA ---
    refBomba.on('value', (snapshot) => {
        bombaEstadoActual = snapshot.val();
        const btn = document.getElementById('btnBomba');
        const txt = document.getElementById('estadoTxt');

        if (bombaEstadoActual) {
            btn.innerText = "APAGAR BOMBA";
            btn.className = "btn btn-off";
            txt.innerText = "Estado: Bomba Activa (Remoto)";
        } else {
            btn.innerText = "ENCENDER BOMBA";
            btn.className = "btn btn-on";
            txt.innerText = "Estado: Bomba Apagada / Modo Automático";
        }
    });

    function toggleBomba() {
        // Invierte el valor actual en Firebase
        refBomba.set(!bombaEstadoActual);
    }
</script>

</body>
</html>
