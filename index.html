<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Panel de Control - Planta-Pro-Max</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        body { font-family: 'Arial', sans-serif; background: #f0f2f5; text-align: center; padding: 20px; }
        .card { background: white; max-width: 400px; margin: auto; padding: 25px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .val { font-size: 24px; font-weight: bold; color: #2c3e50; }
        .btn { border: none; padding: 15px 30px; font-size: 18px; border-radius: 10px; cursor: pointer; color: white; transition: 0.3s; width: 100%; margin-top: 20px; }
        .btn-on { background: #27ae60; box-shadow: 0 4px #1e8449; }
        .btn-off { background: #e74c3c; box-shadow: 0 4px #c0392b; }
        .status { font-size: 12px; color: #7f8c8d; margin-top: 10px; }
    </style>
</head>
<body>

<div class="card">
    <h2>Planta-Pro-Max 🌿</h2>
    <p>Humedad Tierra: <span id="tierra" class="val">--</span>%</p>
    <p>Luz: <span id="luz" class="val">--</span></p>
    <hr>
    <h3>Control Manual</h3>
    <button id="btnBomba" class="btn btn-off" onclick="toggleBomba()">Encender Bomba</button>
    <p id="info" class="status">Sincronizando...</p>
</div>

<script>
    // CONFIGURACIÓN EXACTA
    const firebaseConfig = {
        databaseURL: "https://sensores-temp-y-humedad-default-rtdb.firebaseio.com/"
    };
    
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let estadoBomba = false;

    // Escuchar datos de sensores
    db.ref('sensor').on('value', (snap) => {
        const d = snap.val();
        if(d) {
            document.getElementById('tierra').innerText = d.tierra || 0;
            document.getElementById('luz').innerText = d.luz || 0;
            document.getElementById('info').innerText = "Conexión en línea ✅";
        }
    });

    // Escuchar estado del botón para sincronizar la interfaz
    db.ref('actuadores/bombaManual').on('value', (snap) => {
        estadoBomba = snap.val() || false;
        const btn = document.getElementById('btnBomba');
        btn.innerText = estadoBomba ? "APAGAR BOMBA" : "ENCENDER BOMBA";
        btn.className = estadoBomba ? "btn btn-on" : "btn btn-off";
    });

    // Función para enviar datos
    function toggleBomba() {
        const nuevoEstado = !estadoBomba;
        db.ref('actuadores/bombaManual').set(nuevoEstado)
        .then(() => console.log("Enviado: " + nuevoEstado))
        .catch(err => alert("Error: " + err.message));
    }
</script>

</body>
</html>
