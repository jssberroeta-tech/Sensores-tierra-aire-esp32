<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invernadero Planta-Pro-Max</title>
    
    <!-- Firebase SDK (Versión estable 8.10.0) -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <style>
        :root {
            --primary: #2c3e50;
            --success: #27ae60;
            --danger: #e74c3c;
            --bg: #f5f6fa;
        }

        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg); margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        
        .card {
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        h1 { color: var(--primary); margin-bottom: 20px; font-size: 24px; }
        
        .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 25px; }
        
        .stat-box { background: #f9f9f9; padding: 15px; border-radius: 12px; border: 1px solid #eee; }
        .stat-label { font-size: 12px; color: #7f8c8d; text-transform: uppercase; display: block; }
        .stat-value { font-size: 20px; font-weight: bold; color: var(--primary); }

        .btn {
            width: 100%;
            padding: 15px;
            font-size: 18px;
            font-weight: bold;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            color: white;
            text-transform: uppercase;
        }

        .btn-off { background-color: var(--danger); box-shadow: 0 4px #c0392b; }
        .btn-on { background-color: var(--success); box-shadow: 0 4px #1e8449; }
        .btn:active { transform: translateY(4px); box-shadow: 0 0; }

        #conexion-status { font-size: 11px; margin-top: 15px; color: #95a5a6; }
    </style>
</head>
<body>

<div class="card">
    <h1>Planta-Pro-Max 🌿</h1>
    
    <div class="stat-grid">
        <div class="stat-box">
            <span class="stat-label">Humedad Tierra</span>
            <span id="tierra" class="stat-value">--</span><span class="stat-value">%</span>
        </div>
        <div class="stat-box">
            <span class="stat-label">Luz (Raw)</span>
            <span id="luz" class="stat-value">--</span>
        </div>
    </div>

    <hr style="border: 0; border-top: 1px solid #eee; margin-bottom: 20px;">

    <h3>Control Manual</h3>
    <button id="btnBomba" class="btn btn-off" onclick="toggleBomba()">Encender Bomba</button>
    
    <p id="conexion-status">Estado: Sincronizando con Firebase...</p>
</div>

<script>
    // --- 1. CONFIGURACIÓN DE FIREBASE ---
    const firebaseConfig = {
        databaseURL: "https://sensores-temp-y-humedad-default-rtdb.firebaseio.com/"
    };
    
    // Inicializar Firebase
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    let bombaEstadoLocal = false;

    // --- 2. ESCUCHAR DATOS EN TIEMPO REAL ---
    // Escucha la carpeta 'sensor' que crea el ESP32
    database.ref('sensor').on('value', (snapshot) => {
        const data = snapshot.val();
        if (data) {
            document.getElementById('tierra').innerText = data.tierra || 0;
            document.getElementById('luz').innerText = data.luz || 0;
            document.getElementById('conexion-status').innerText = "Conexión: OK ✅";
        }
    });

    // Escucha el estado actual de la bomba para sincronizar el botón
    database.ref('actuadores/bombaManual').on('value', (snapshot) => {
        bombaEstadoLocal = snapshot.val() || false;
        actualizarBotonUI(bombaEstadoLocal);
    });

    // --- 3. FUNCIÓN PARA ENVIAR SEÑAL ---
    function toggleBomba() {
        const nuevoEstado = !bombaEstadoLocal;
        
        // Escribimos en la ruta absoluta. Esto CREARÁ la carpeta si no existe.
        database.ref('actuadores/bombaManual').set(nuevoEstado)
        .then(() => {
            console.log("Comando enviado: " + nuevoEstado);
        })
        .catch((error) => {
            console.error("Error al enviar:", error);
            alert("Error de permisos: Revisa las Reglas de Firebase");
        });
    }

    function actualizarBotonUI(estado) {
        const btn = document.getElementById('btnBomba');
        if (estado) {
            btn.innerText = "Apagar Bomba";
            btn.className = "btn btn-on";
        } else {
            btn.innerText = "Encender Bomba";
            btn.className = "btn btn-off";
        }
    }
</script>

</body>
</html>
